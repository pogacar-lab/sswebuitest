environments:
  # ---- Selenium ----

  # Chrome 1920×1080 全画面（タスクバーなし）
  - env_id: chrome_1920x1080
    browser: chrome
    engine: selenium
    window_width: 1920
    window_height: 1080
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false

  # Chrome 960×1080 縦長（Windowsキー＋右矢印 スナップ右半分）
  - env_id: chrome_960x1080
    browser: chrome
    engine: selenium
    window_width: 960
    window_height: 1080
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false

  # ---- Playwright ----

  # Chromium 1920×1080（Playwright）
  - env_id: chromium_1920x1080_pw
    browser: chromium
    engine: playwright
    window_width: 1920
    window_height: 1080
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false

  # Chromium 960×1080（Playwright）
  - env_id: chromium_960x1080_pw
    browser: chromium
    engine: playwright
    window_width: 960
    window_height: 1080
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false

  # Firefox 1920×1080（Playwright）
  - env_id: firefox_1920x1080_pw
    browser: firefox
    engine: playwright
    window_width: 1920
    window_height: 1080
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false

  # WebKit 1920×1080（Playwright）
  - env_id: webkit_1920x1080_pw
    browser: webkit
    engine: playwright
    window_width: 1920
    window_height: 1080
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false
