environments:
  # Chrome 1920×1080 全画面（タスクバーなし）
  - env_id: chrome_1920x1080
    browser: chrome
    window_width: 1920
    window_height: 1080
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false

  # Chrome 960×1080 縦長（Windowsキー＋右矢印 スナップ右半分）
  - env_id: chrome_960x1080
    browser: chrome
    window_width: 960
    window_height: 1080
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false
