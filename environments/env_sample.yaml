environments:
  - env_id: chrome_1440x900
    browser: chrome
    window_width: 1440
    window_height: 900
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false

  - env_id: chrome_1280x800_headless
    browser: chrome
    window_width: 1280
    window_height: 800
    options:
      headless: true
      zoom: 1.0
      compatibility_mode: false

  - env_id: firefox_1280x800
    browser: firefox
    window_width: 1280
    window_height: 800
    options:
      headless: false
      zoom: 1.0
      compatibility_mode: false

  - env_id: edge_1440x900_zoom125
    browser: edge
    window_width: 1440
    window_height: 900
    options:
      headless: false
      zoom: 1.25
      compatibility_mode: true
